<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#073b2b">
  <title>Rainforest Falls Live Giving</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="scene">
    <div class="sun-rays"></div>
    <div class="mist mist-one"></div>
    <div class="mist mist-two"></div>

    <header class="brand">
      <p class="church">Winston Salem First</p>
      <h1 id="campaignName">Rainforest Falls</h1>
      <p class="subtitle" id="campaignSubtitle">The Nature of God • Vacation Bible School 2026</p>
    </header>

    <section class="stage">
      <div class="rainbow" id="rainbow"></div>

      <div class="cliff" aria-hidden="true">
        <div class="waterfall">
          <span></span><span></span><span></span>
        </div>
      </div>

      <div class="bird bird-one">🦜</div>
      <div class="bird bird-two">🦜</div>
      <div class="butterfly butterfly-one">🦋</div>
      <div class="butterfly butterfly-two">🦋</div>

      <div class="lagoon" aria-hidden="true">
        <div class="water-level" id="waterLevel"></div>
        <div class="wave wave-one"></div>
        <div class="wave wave-two"></div>
      </div>

      <section class="progress-card" aria-live="polite">
        <p class="eyebrow">Journey to the Goal</p>
        <div class="amount" id="amountRaised">$0</div>
        <p class="goal-line">raised of <strong id="goalAmount">$10,000</strong></p>

        <div class="progress-track" id="progressTrack" role="progressbar"
             aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
          <div class="progress-fill" id="progressFill"></div>
        </div>

        <div class="stats">
          <span><strong id="percentage">0%</strong> complete</span>
          <span><strong id="remaining">$10,000</strong> remaining</span>
        </div>

        <p class="message" id="message">Every gift helps children discover the wonder of God's creation.</p>
      </section>
    </section>

    <footer class="footer">
      <div>
        <strong id="status">Connecting…</strong>
        <span id="updated">Waiting for live data</span>
      </div>
      <a id="giveButton" class="give-button" href="https://wsfirst.com/" target="_blank" rel="noopener">Give to VBS</a>
    </footer>

    <canvas id="confetti"></canvas>
  </main>

  <script type="module" src="display.js"></script>
</body>
</html>
