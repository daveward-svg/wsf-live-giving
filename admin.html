<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>WSF Live Giving Admin</title><link rel='stylesheet' href='admin.css'></head><body><main><section id='login'><h1>WSF Live Giving</h1><form id='loginForm'><input id='email' type='email' placeholder='Email' required><input id='password' type='password' placeholder='Password' required><button>Sign in</button><p id='loginMsg'></p></form></section><section id='panel' hidden><div class='top'><h1>Rainforest Falls Admin</h1><button id='logout'>Sign out</button></div><h2 id='live'>$0</h2><div class='quick'><button data-add='25'>+$25</button><button data-add='50'>+$50</button><button data-add='100'>+$100</button><button data-add='250'>+$250</button><button data-add='500'>+$500</button></div><form id='campaignForm'><label>Raised<input id='raised' type='number' min='0' required></label><label>Goal<input id='goal' type='number' min='1' required></label><label>Campaign name<input id='name' required></label><label>Subtitle<input id='subtitle' required></label><label>Giving URL<input id='givingUrl' type='url' required></label><button>Save live update</button><p id='saveMsg'></p></form><a href='index.html' target='_blank'>Open public display</a></section></main><script type='module' src='admin.js'></script></body></html>
